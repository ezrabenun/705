<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light">
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2024%2024'%3E%3Crect%20width='24'%20height='24'%20rx='4'%20fill='%23EDEAE3'/%3E%3Cg%20fill='none'%20stroke='%232b3440'%20stroke-width='1.6'%3E%3Crect%20x='4'%20y='4'%20width='16'%20height='16'%20rx='1'/%3E%3Cpath%20d='M13%204V20M4%2012H13'/%3E%3C/g%3E%3Cpath%20d='M13%2015a4%204%200%200%201%204%204'%20fill='none'%20stroke='%238a6440'%20stroke-width='1.4'/%3E%3C/svg%3E">
<title>First Floor — Rendered</title>
<style>
  :root{--ink:#1f2733;--muted:#5b6675;--panel:rgba(255,255,255,.86);--line:rgba(31,39,51,.12)}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden;background:#e7ecf0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink)}
  #app{position:fixed;inset:0}canvas{display:block}
  .hud{position:fixed;z-index:10;backdrop-filter:blur(10px);background:var(--panel);
    border:1px solid var(--line);border-radius:14px;box-shadow:0 6px 24px rgba(20,28,40,.12)}
  #title{top:16px;left:16px;padding:12px 16px;max-width:58vw}
  #title h1{margin:0;font-size:15px;letter-spacing:.2px}
  #title p{margin:3px 0 0;font-size:11.5px;color:var(--muted)}
  #controls{top:16px;right:16px;padding:10px;display:flex;flex-direction:column;gap:8px;width:188px}
  .btn{appearance:none;border:1px solid var(--line);background:#fff;color:var(--ink);font-size:12px;
    font-weight:600;padding:8px 10px;border-radius:9px;cursor:pointer;text-align:left;display:flex;
    justify-content:space-between;align-items:center;gap:8px;transition:.15s;text-decoration:none}
  .btn:hover{border-color:rgba(31,39,51,.28)}
  .btn .val{color:var(--muted);font-weight:500}
  #hint{bottom:16px;left:16px;padding:9px 13px;font-size:11.5px;color:var(--muted)}
  #hint b{color:var(--ink)}
  #legend{bottom:16px;right:16px;padding:11px 13px;font-size:11px;max-width:220px}
  #legend .row{display:flex;align-items:center;gap:7px;margin:3px 0}
  #legend .sw{width:12px;height:12px;border-radius:3px;border:1px solid rgba(0,0,0,.15);flex:none}
  #loading{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;
    background:#e7ecf0;font-size:13px;color:var(--muted)}
  body.clean .hud{opacity:0;pointer-events:none}
  .hud{transition:opacity .2s}
  #uiToggle{position:fixed;z-index:60;bottom:16px;left:50%;transform:translateX(-50%);
    backdrop-filter:blur(10px);background:var(--panel);border:1px solid var(--line);border-radius:20px;
    box-shadow:0 6px 24px rgba(20,28,40,.12);color:var(--ink);font:600 12px -apple-system,Segoe UI,Roboto,sans-serif;
    padding:8px 14px;cursor:pointer}
  #uiToggle:hover{border-color:rgba(31,39,51,.28)}
</style>
</head>
<body>
<div id="app"></div>
<button id="uiToggle">Hide UI &nbsp;·&nbsp; H</button>
<div id="loading">Building the model…</div>

<div id="title" class="hud">
  <h1>First Floor — Rendered</h1>
  <p id="subtitle">Photoreal · modern French country — built live from your 2D plan</p>
</div>

<div id="controls" class="hud">
  <a class="btn" id="planBtn" href="index.html">← Back to plan</a>
  <a class="btn" id="simpleBtn" href="first_floor_3d.html">Simple 3D view →</a>
  <button class="btn" id="wallsBtn">Walls <span class="val">Low</span></button>
  <button class="btn" id="floorsBtn" style="display:none">Floors <span class="val">All</span></button>
  <button class="btn" id="furnBtn">Furniture <span class="val">On</span></button>
  <button class="btn" id="labelBtn">Labels <span class="val">Off</span></button>
  <button class="btn" id="spinBtn">Auto-rotate <span class="val">Off</span></button>
  <button class="btn" id="resetBtn">Reset view <span class="val">↺</span></button>
</div>

<div id="hint" class="hud"><b>Drag</b> orbit · <b>Scroll</b> zoom · <b>Right-drag</b> pan</div>

<div id="legend" class="hud">
  <div class="row"><span class="sw" style="background:#c79a63"></span>Oak plank floor</div>
  <div class="row"><span class="sw" style="background:#efe7d8"></span>Lime-plaster walls</div>
  <div class="row"><span class="sw" style="background:#9aa48c"></span>Sage cabinetry / doors</div>
  <div class="row"><span class="sw" style="background:#c9c2b4"></span>Honed stone</div>
  <div class="row"><span class="sw" style="background:#2c2b28"></span>Wrought iron · brass</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
"use strict";

/* ============ load the live layout ============ */
function fromLocal(){
  try{const s=localStorage.getItem('layout3d')||localStorage.getItem('savedLayout');
    if(s){const d=JSON.parse(s);if(d&&Array.isArray(d.rooms))return d;}}catch(e){}
  return null;
}
async function loadLayout(){
  let L=fromLocal(); if(L)return L;
  try{ // fall back to the shared default from the Pages KV function
    const dn=await fetch('/kv/defaultVersionName').then(r=>r.ok?r.text():'');
    if(dn){const vs=await fetch('/kv/savedVersions').then(r=>r.ok?r.json():{}); if(vs&&vs[dn])return vs[dn];}
  }catch(e){}
  return {rooms:[],openings:[],furniture:[],walls:{ext:7,int:4.75}};
}

const CEIL=10, SLAB=0.35, FT=SLAB+0.02;
const DOOR_OPEN=0.5;   // door leaves are shown open this fraction of a full 90° swing (0.5 = 45°)
const POCKET_OPEN=0.75; // pocket doors are shown slid this fraction into the wall (0.75 = mostly open)

/* ---------- scene & photoreal renderer ---------- */
const app=document.getElementById('app');
const scene=new THREE.Scene(); scene.background=new THREE.Color(0xe8edf1);
const camera=new THREE.PerspectiveCamera(42,innerWidth/innerHeight,0.5,6000);
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2)); renderer.setSize(innerWidth,innerHeight);
renderer.shadowMap.enabled=true; renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.outputEncoding=THREE.sRGBEncoding;
renderer.toneMapping=THREE.ACESFilmicToneMapping;   // filmic tone-map → photographic highlights/shadows
renderer.toneMappingExposure=0.9;
app.appendChild(renderer.domElement);

// image-based lighting: a soft warm-daylight sky, baked to an env map with PMREM for realistic soft shading & sheen
function skyEquirect(){const c=document.createElement('canvas');c.width=1024;c.height=512;const g=c.getContext('2d');
  const sky=g.createLinearGradient(0,0,0,256);sky.addColorStop(0,'#aebdcd');sky.addColorStop(0.7,'#c6d0d8');sky.addColorStop(1,'#ded3bd');
  g.fillStyle=sky;g.fillRect(0,0,1024,256);
  const grd=g.createLinearGradient(0,256,0,512);grd.addColorStop(0,'#c2b8a2');grd.addColorStop(1,'#8f8672');
  g.fillStyle=grd;g.fillRect(0,256,1024,256);
  const sun=g.createRadialGradient(330,120,8,330,120,170);sun.addColorStop(0,'rgba(255,246,224,0.85)');sun.addColorStop(1,'rgba(255,244,224,0)');
  g.fillStyle=sun;g.fillRect(0,0,1024,300);
  const t=new THREE.CanvasTexture(c);t.mapping=THREE.EquirectangularReflectionMapping;t.encoding=THREE.sRGBEncoding;return t;}
const pmrem=new THREE.PMREMGenerator(renderer);pmrem.compileEquirectangularShader();
scene.environment=pmrem.fromEquirectangular(skyEquirect()).texture;

// warm key "sun" with wide, soft shadows + a cool sky fill and a gentle warm bounce
scene.add(new THREE.HemisphereLight(0xeaf0f6,0x9a8c72,0.4));
const sun=new THREE.DirectionalLight(0xfff2dc,1.55); sun.position.set(58,116,44); sun.castShadow=true;
sun.shadow.mapSize.set(2048,2048); sun.shadow.radius=6; sun.shadow.bias=-0.0004;
const sc=sun.shadow.camera,sz=130;sc.left=-sz;sc.right=sz;sc.top=sz;sc.bottom=-sz;sc.near=1;sc.far=480;scene.add(sun);
const fill=new THREE.DirectionalLight(0xdfe7f2,0.35);fill.position.set(-60,55,-46);scene.add(fill);

/* ---------- helpers ---------- */
function M(color,o){return new THREE.MeshStandardMaterial(Object.assign({color:color,roughness:0.82,metalness:0.03},o||{}));}
function box(w,h,d,color,x,y,z,rot){const mat=(color&&color.isMaterial)?color:M(color);
  const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat);m.position.set(x,(y||0)+h/2,z||0);
  if(rot)m.rotation.y=rot;m.castShadow=true;m.receiveShadow=true;return m;}
function cyl(r,h,color,x,y,z){const mat=(color&&color.isMaterial)?color:M(color);
  const m=new THREE.Mesh(new THREE.CylinderGeometry(r,r,h,20),mat);m.position.set(x,(y||0)+h/2,z||0);
  m.castShadow=true;m.receiveShadow=true;return m;}
function bx(g){g.add(box.apply(null,[].slice.call(arguments,1)));}
function cy(g){g.add(cyl.apply(null,[].slice.call(arguments,1)));}

const world=new THREE.Group(); scene.add(world);

/* ============ modern French-country material palette ============ */
const F={woodL:0xc79a63,wood:0x9c7648,woodD:0x5c4630,fabric:0xcfc3ad,fabricB:0x93a08c,cushion:0xe4dcc8,
  white:0xf1ebdd,metal:0xb6b4ac,steel:0xb9bcbe,stone:0xd7d0c0,cab:0x9aa48c,cabD:0x6b5a44,
  black:0x2b2a27,plant:0x6f8a5c,pot:0xb07a54,bed:0xd8cfbb,sheet:0xf3efe4,glass:0xcfe3ea,
  book:[0x8a5a3c,0x6b7a5a,0x9c7648,0xa1483d,0x556b6e,0x7a6a52]};

/* ---------- procedural textures (canvas → CanvasTexture; keeps the file self-contained) ---------- */
function canvasTex(w,h,draw){const c=document.createElement('canvas');c.width=w;c.height=h;draw(c.getContext('2d'),w,h);
  const t=new THREE.CanvasTexture(c);t.wrapS=t.wrapT=THREE.RepeatWrapping;t.anisotropy=8;t.encoding=THREE.sRGBEncoding;return t;}
const OAK=canvasTex(512,512,(g,w,h)=>{                       // wide-plank oak
  const planks=6,ph=h/planks,base=['#8a5f2c','#7f5626','#956733','#78521f','#8c6130','#6f4c22'];
  for(let i=0;i<planks;i++){g.fillStyle=base[i%6];g.fillRect(0,i*ph,w,ph);
    for(let s=0;s<46;s++){g.strokeStyle='rgba(86,58,30,'+(0.03+Math.random()*0.06)+')';g.lineWidth=0.5+Math.random();
      const y=i*ph+Math.random()*ph;g.beginPath();g.moveTo(0,y);g.bezierCurveTo(w*0.3,y+(Math.random()-0.5)*7,w*0.6,y+(Math.random()-0.5)*7,w,y+(Math.random()-0.5)*5);g.stroke();}
    g.strokeStyle='rgba(58,38,18,0.55)';g.lineWidth=1.6;g.beginPath();g.moveTo(0,i*ph);g.lineTo(w,i*ph);g.stroke();
    const jx=(i%2?w*0.52:w*0.24)+(Math.random()*40-20);g.strokeStyle='rgba(58,38,18,0.5)';g.lineWidth=1.3;g.beginPath();g.moveTo(jx,i*ph);g.lineTo(jx,(i+1)*ph);g.stroke();}});
const PLASTER=canvasTex(256,256,(g,w,h)=>{                   // soft lime-plaster mottle
  g.fillStyle='#f1ebdd';g.fillRect(0,0,w,h);
  for(let i=0;i<2600;i++){const a=(Math.random()-0.5)*0.05;g.fillStyle='rgba('+(a<0?90:255)+','+(a<0?80:250)+','+(a<0?66:236)+','+Math.abs(a)+')';
    g.fillRect(Math.random()*w,Math.random()*h,1.5,1.5);}});
PLASTER.repeat.set(3,2);
// clone the oak with a per-room plank scale so planks read ~consistent across differently-sized rooms
function oakFloorMat(wFt,hFt){const t=OAK.clone();t.needsUpdate=true;t.wrapS=t.wrapT=THREE.RepeatWrapping;
  t.repeat.set(Math.max(1,wFt/8),Math.max(1,hFt/8));
  return new THREE.MeshStandardMaterial({map:t,roughness:0.62,metalness:0});}   // matte-satin oak (no glossy clearcoat → no sky wash)
const MAT={
  plasterInt:new THREE.MeshStandardMaterial({map:PLASTER,color:0xffffff,roughness:0.95,metalness:0}),
  plasterExt:new THREE.MeshStandardMaterial({map:PLASTER,color:0xe7dcc6,roughness:0.96,metalness:0}),
};
function sofa(g,w,d,col,rot,x,z){const s=new THREE.Group();
  bx(s,w,0.5,d,col,0,0,0);bx(s,w,1.0,0.4,col,0,0.5,-(d/2-0.2));
  bx(s,0.4,0.8,d,col,-(w/2-0.2),0.5,0);bx(s,0.4,0.8,d,col,(w/2-0.2),0.5,0);
  bx(s,w-0.9,0.22,d-0.6,F.cushion,0,0.5,0.05);s.rotation.y=rot||0;s.position.set(x||0,0,z||0);g.add(s);}
function chair(g,x,z,rot,col){const c=new THREE.Group();col=col||F.wood;
  bx(c,1.5,0.15,1.5,col,0,1.35,0);[[-0.6,-0.6],[0.6,-0.6],[-0.6,0.6],[0.6,0.6]].forEach(p=>bx(c,0.15,1.35,0.15,col,p[0],0,p[1]));
  bx(c,1.5,1.1,0.15,col,0,1.5,-0.67);c.rotation.y=rot||0;c.position.set(x,0,z);g.add(c);}
function table(g,w,d,h,col,x,z){const t=new THREE.Group();h=h||2.4;col=col||F.wood;
  bx(t,w,0.2,d,col,0,h-0.2,0);const lx=w/2-0.4,lz=d/2-0.4;
  [[-lx,-lz],[lx,-lz],[-lx,lz],[lx,lz]].forEach(p=>bx(t,0.2,h-0.2,0.2,F.woodD,p[0],0,p[1]));t.position.set(x||0,0,z||0);g.add(t);}
function counter(g,w,d,x,z,rot){const c=new THREE.Group();bx(c,w,2.8,d,F.cab,0,0,0);bx(c,w+0.1,0.18,d+0.1,F.stone,0,2.8,0);c.rotation.y=rot||0;c.position.set(x,0,z);g.add(c);}
function stool(g,x,z){cy(g,0.5,2.2,F.woodD,x,0,z);}
// one upright bicycle, length along z, wheels rolling on the floor (axle along x)
function bike(g,x,z,rot,col){const b=new THREE.Group();col=col||0x3a7ca5;
  const wR=1.0,wT=0.16,hubY=wR,zf=-1.9,zr=1.9,topY=hubY+0.9;   // front/rear hub z, top-tube height
  const wheel=zz=>{const m=new THREE.Mesh(new THREE.CylinderGeometry(wR,wR,wT,20),M(0x2a2a2e,{roughness:.7}));
    m.rotation.z=Math.PI/2;m.position.set(0,hubY,zz);m.castShadow=true;b.add(m);};
  wheel(zf);wheel(zr);
  const tube=(x1,y1,z1,x2,y2,z2,r,tc)=>{const a=new THREE.Vector3(x1,y1,z1),bb=new THREE.Vector3(x2,y2,z2),d=new THREE.Vector3().subVectors(bb,a),len=d.length();
    const m=new THREE.Mesh(new THREE.CylinderGeometry(r,r,len,10),M(tc==null?col:tc,{metalness:.35,roughness:.5}));
    m.position.copy(a).addScaledVector(d,0.5);m.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),d.clone().normalize());m.castShadow=true;b.add(m);};
  tube(0,hubY,zf,0,topY,-0.2,0.07);   // front fork/down tube
  tube(0,hubY,zr,0,topY,0.2,0.07);    // rear stay
  tube(0,topY,-0.2,0,topY,0.2,0.07);  // top tube
  tube(0,topY,-0.2,0,topY+0.75,-0.2,0.05);   // steerer
  tube(0,topY,0.2,0,topY+0.5,0.2,0.05);      // seat post
  const hb=new THREE.Mesh(new THREE.BoxGeometry(1.4,0.1,0.1),M(0x2a2a2e));hb.position.set(0,topY+0.78,-0.2);hb.castShadow=true;b.add(hb);
  const seat=new THREE.Mesh(new THREE.BoxGeometry(0.35,0.12,0.8),M(0x24282e));seat.position.set(0,topY+0.55,0.2);seat.castShadow=true;b.add(seat);
  b.rotation.y=rot||0;b.position.set(x,0,z);g.add(b);}
function fridge(g,x,z,rot){const c=new THREE.Group();bx(c,2.8,6.2,2.6,F.steel,0,0,0);bx(c,0.15,6,0.2,F.metal,1.1,0.1,1.35);c.rotation.y=rot||0;c.position.set(x,0,z);g.add(c);}
function stove(g,x,z){const c=new THREE.Group();bx(c,2.6,2.9,2.4,F.white,0,0,0);bx(c,2.5,0.12,2.3,F.black,0,2.9,0);c.position.set(x,0,z);g.add(c);}
function toilet(g,x,z,rot){const c=new THREE.Group();bx(c,1.3,1.2,1.7,F.white,0,0,0.1);bx(c,1.3,1.9,0.6,F.white,0,0,-0.75);c.rotation.y=rot||0;c.position.set(x,0,z);g.add(c);}
function vanity(g,w,x,z,rot){const c=new THREE.Group();bx(c,w,2.6,1.8,F.cabD,0,0,0);bx(c,w+0.1,0.15,1.9,F.stone,0,2.6,0);bx(c,0.9,0.15,0.7,F.white,0,2.55,0);c.rotation.y=rot||0;c.position.set(x,0,z);g.add(c);}
function tub(g,x,z,rot){const c=new THREE.Group();bx(c,5,1.8,2.5,F.white,0,0,0);bx(c,4.4,0.4,1.9,0xcfd9e2,0,1.4,0);c.rotation.y=rot||0;c.position.set(x,0,z);g.add(c);}
function bed(g,w,l,x,z,rot){const c=new THREE.Group();bx(c,w+0.4,0.9,l+0.4,F.woodD,0,0,0);bx(c,w,0.9,l,F.bed,0,0.9,0.2);
  bx(c,w,0.5,1.4,F.sheet,0,1.35,-(l/2-1));bx(c,w+0.4,3,0.4,F.woodD,0,0,-(l/2+0.1));c.rotation.y=rot||0;c.position.set(x,0,z);g.add(c);}
function shelf(g,w,x,z,rot){const c=new THREE.Group();bx(c,w,7,1,F.wood,0,0,0);
  for(let s=1;s<=4;s++)for(let b=0;b<6;b++)bx(c,(w-0.6)/6-0.05,1.1,0.7,F.book[(s+b)%6],-w/2+0.4+b*((w-0.6)/6),s*1.4-0.1,0.05);
  c.rotation.y=rot||0;c.position.set(x,0,z);g.add(c);}
function tv(g,x,z,rot){const c=new THREE.Group();bx(c,5,1.6,1.4,F.woodD,0,0,0);bx(c,4.6,2.7,0.2,F.black,0,1.6,-0.4);c.rotation.y=rot||0;c.position.set(x,0,z);g.add(c);}
function plant(g,x,z){cy(g,0.55,0.9,F.pot,x,0,z);const s=new THREE.Mesh(new THREE.SphereGeometry(1.1,12,12),M(F.plant,{roughness:1}));s.position.set(x,2.3,z);s.scale.y=1.3;s.castShadow=true;g.add(s);}
function washer(g,x,z){bx(g,2.2,3,2.2,F.white,x,0,z);const dr=new THREE.Mesh(new THREE.CircleGeometry(0.7,18),M(0x2a2e34));dr.position.set(x,1.6,z+1.11);g.add(dr);}
function tallcab(g,w,d,x,z,rot){const c=new THREE.Group();bx(c,w,7,d,F.cab,0,0,0);   // full-height cabinet (counter material, tall)
  const n=Math.max(1,Math.round(w/1.5));for(let k=0;k<n;k++)bx(c,0.06,6.6,0.06,F.cabD,-w/2+w*(k+0.5)/n,0.2,d/2);   // door seams on the front face
  c.rotation.y=rot||0;c.position.set(x,0,z);g.add(c);}
function doubleoven(g,w,d,x,z,rot){const c=new THREE.Group();bx(c,w,5.6,d,F.steel,0,0,0);   // stainless tower
  const glass=M(0x2a2e34,{roughness:.4});bx(c,w*0.8,1.7,0.1,glass,0,1.0,d/2);bx(c,w*0.8,1.7,0.1,glass,0,2.9,d/2);   // two stacked oven doors
  bx(c,w*0.85,0.12,0.16,F.metal,0,2.0,d/2+0.05);bx(c,w*0.85,0.12,0.16,F.metal,0,3.9,d/2+0.05);   // handles
  bx(c,w,0.7,d,F.black,0,4.9,0);c.rotation.y=rot||0;c.position.set(x,0,z);g.add(c);}   // control panel band up top
function boiler(g,w,d,x,z,rot){const c=new THREE.Group();bx(c,w,4.2,d,F.metal,0,0,0);   // metal cabinet
  bx(c,0.25,3,0.25,F.steel,0,4.2,-d*0.2);bx(c,0.25,3,0.25,F.steel,0,4.2,d*0.2);   // flue + supply pipes out the top
  bx(c,w*0.55,0.9,0.1,F.black,0,1.7,d/2);c.rotation.y=rot||0;c.position.set(x,0,z);g.add(c);}   // front control panel
function waterheater(g,w,d,x,z){const r=Math.min(w,d)/2*0.92;cy(g,r,5,F.steel,x,0,z);   // tall insulated tank

    flush();}
  if(footprint){                                          // new model: outline = exterior, iwalls = interior
    for(let i=0;i<footprint.length;i++){const p=footprint[i],q=footprint[(i+1)%footprint.length];buildWallAlong(p[0],p[1],q[0],q[1],true);}
    iwalls.forEach((w,wi)=>{if(iwallsHide3d[wi])return;
      if(iwallsFence[wi]){for(let i=0;i+1<w.length;i++)buildFence(w[i][0],w[i][1],w[i+1][0],w[i+1][1],iwallsFenceFoot[wi]);return;}
      for(let i=0;i+1<w.length;i++)buildWallAlong(w[i][0],w[i][1],w[i+1][0],w[i+1][1],false);});
  } else {                                                // legacy saves (wings/rooms only): derive walls from room edges
    const drawn=new Set();
    closed.forEach(r=>{const a=r.x,b=r.y,c=r.x+r.w,d=r.y+r.h;
      const edges=[
        {x1:a,z1:b,x2:c,z2:b,nx:0,nz:-1,h:1},{x1:a,z1:d,x2:c,z2:d,nx:0,nz:1,h:1},
        {x1:a,z1:b,x2:a,z2:d,nx:-1,nz:0,h:0},{x1:c,z1:b,x2:c,z2:d,nx:1,nz:0,h:0}];
      edges.forEach(e=>{const len=Math.hypot(e.x2-e.x1,e.z2-e.z1),n=Math.max(1,Math.round(len/STEP));
        let run=null,rExt=null; const flush=()=>{if(run){addWall(run.x1,run.z1,run.x2,run.z2,rExt);run=null;}};
        for(let i=0;i<n;i++){
          const mx=e.x1+(e.x2-e.x1)*(i+0.5)/n, mz=e.z1+(e.z2-e.z1)*(i+0.5)/n;
          const ox=mx+e.nx*0.4, oz=mz+e.nz*0.4;
          const outside=isOutside(ox,oz);
          let draw=true, ext=outside;
          if(gapHit(mx,mz,e.h)) draw=false;
          else if(insideOpen(ox,oz)) draw=false;
          else if(!outside){const k=key(e.h?mz:mx,e.h?mx:mz,e.h); if(drawn.has(k))draw=false; else drawn.add(k);}
          const sx=e.x1+(e.x2-e.x1)*i/n, sz=e.z1+(e.z2-e.z1)*i/n;
          const ex=e.x1+(e.x2-e.x1)*(i+1)/n, ez=e.z1+(e.z2-e.z1)*(i+1)/n;
          if(draw){ if(run&&rExt===ext){run.x2=ex;run.z2=ez;} else {flush();run={x1:sx,z1:sz,x2:ex,z2:ez};rExt=ext;} }
          else flush();
        }
        flush();
      });
    });
  }

  // ---- windows (glass overlay) ----
  openings.forEach(o=>{ if(o.type!=='window')return;
    const glass=M(0xdfeef2,{transparent:true,opacity:0.18,roughness:.05,metalness:0,side:THREE.DoubleSide,depthWrite:false});  // clear glass; reflects the sky env
    const frame=M(F.white,{roughness:.7}),sill=2.4,h=4.4,ft=0.18;                                                             // painted wood frame + muntins
    if(o.orient==='h'){const cx=(o.x+o.len/2)-CX,cz=CZ-o.y;
      FG.add(box(o.len,h,0.5,glass,cx,sill,cz));
      FG.add(box(o.len,ft,0.62,frame,cx,sill+h/2,cz));FG.add(box(o.len,ft,0.62,frame,cx,sill-h/2,cz));      // head + sill
      FG.add(box(ft,h,0.62,frame,cx-o.len/2,sill,cz));FG.add(box(ft,h,0.62,frame,cx+o.len/2,sill,cz));      // jambs
      FG.add(box(o.len,0.1,0.58,frame,cx,sill,cz));FG.add(box(0.1,h,0.58,frame,cx,sill,cz));}              // muntins (cross)
    else{const cx=o.x-CX,cz=CZ-(o.y+o.len/2);
      FG.add(box(0.5,h,o.len,glass,cx,sill,cz));
      FG.add(box(0.62,ft,o.len,frame,cx,sill+h/2,cz));FG.add(box(0.62,ft,o.len,frame,cx,sill-h/2,cz));
      FG.add(box(0.62,h,ft,frame,cx,sill,cz-o.len/2));FG.add(box(0.62,h,ft,frame,cx,sill,cz+o.len/2));
      FG.add(box(0.58,0.1,o.len,frame,cx,sill,cz));FG.add(box(0.58,h,0.1,frame,cx,sill,cz));}});

  // ---- doors (open leaf shows swing; doorways are just the gap) ----
  openings.forEach(o=>{ if(o.type!=='door')return; const mat=M(0xf2efe9,{roughness:.7}),s=o.flip?-1:1,by=o.grade?-gradeH:FT;   // grade doors sit at grade
    const ang=DOOR_OPEN*Math.PI/2;                                  // the leaf pivots at the hinge, swinging DOOR_OPEN of the way open
    const leaf=(HX,HZ,cX,cZ,oX,oZ)=>{                               // hinge world (HX,HZ); closed & open unit dirs (world X/Z)
      const dX=Math.cos(ang)*cX+Math.sin(ang)*oX, dZ=Math.cos(ang)*cZ+Math.sin(ang)*oZ;
      const grp=new THREE.Group(); grp.position.set(HX,0,HZ); grp.rotation.y=Math.atan2(-dZ,dX);
      grp.add(box(o.len,6.7,0.16,mat,o.len/2,by,0)); FG.add(grp); };
    if(o.orient==='h'){const hx=o.hinge?o.x+o.len:o.x, sx=o.hinge?o.x:o.x+o.len;
      leaf(hx-CX,CZ-o.y,Math.sign(sx-hx),0,0,s);}                   // closed along the wall (x), open perpendicular (z; flipped)
    else{const hy=o.hinge?o.y+o.len:o.y, sy=o.hinge?o.y:o.y+o.len;
      leaf(o.x-CX,CZ-hy,0,Math.sign(hy-sy),s,0);} });               // closed along the wall (z), open perpendicular (x)

  // ---- pocket doors (slide into the wall — shown POCKET_OPEN open, leaf sits in the wall plane) ----
  openings.forEach(o=>{ if(o.type!=='pocket')return; const mat=M(0xf2efe9,{roughness:.7}),by=o.grade?-gradeH:FT;
    const vis=o.len*(1-POCKET_OPEN), atB=!!o.hinge;                 // vis = leaf still spanning the opening; atB = pocket mouth jamb
    if(o.orient==='h'){const cx=atB?(o.x+o.len-vis/2):(o.x+vis/2); FG.add(box(vis,6.7,0.16,mat,cx-CX,by,CZ-o.y));}
    else{const cy=atB?(o.y+o.len-vis/2):(o.y+vis/2); FG.add(box(0.16,6.7,vis,mat,o.x-CX,by,CZ-cy));} });

  // ---- garage doors (shown OPEN — the panel is rolled up under the ceiling, opening clear below) ----
  openings.forEach(o=>{ if(o.type!=='garage')return; const mat=M(0xd0d5db,{roughness:.5}),ph=0.9,py=CEIL-ph;
    if(o.orient==='h') FG.add(box(o.len,ph,0.7,mat,(o.x+o.len/2)-CX,py,CZ-o.y));
    else               FG.add(box(0.7,ph,o.len,mat,o.x-CX,py,CZ-(o.y+o.len/2))); });

  // ---- furniture ----
  const stairRise=((L.plot&&+L.plot.ceilH)||9)+1;   // floor-to-floor rise for stairs (ceiling height + standard floor assembly)
  const baseYFor=f=>{if(!gradeH)return FT;                                      // no grade offset → everything sits on the first floor
    const inR=r=>(Array.isArray(r.poly)&&r.poly.length>=3)?ptInPoly(f.cx,f.cy,r.poly):(f.cx>r.x&&f.cx<r.x+r.w&&f.cy>r.y&&f.cy<r.y+r.h);
    for(const r of rooms){if(r.grade&&inR(r))return FT-gradeH;}                  // furniture in an at-grade room sits on its dropped floor (a stair there starts at the lower floor)
    if(footprint&&!insideBuilding(f.cx,f.cy))return FT-gradeH;                   // standing outdoors → grade
    return FT;};
  furniture.forEach(f=>{const g=buildPiece(f.type,Math.max(0.5,f.w||3),Math.max(0.5,f.d||3),f,stairRise);
    g.position.set(f.cx-CX,baseYFor(f),CZ-f.cy); g.rotation.y=-(f.rot||0)*Math.PI/180;
    FG.add(g); furnGroups.push(g);});

  // ---- labels ----
  function rr(g,x,y,w,h,r){g.beginPath();g.moveTo(x+r,y);g.arcTo(x+w,y,x+w,y+h,r);g.arcTo(x+w,y+h,x,y+h,r);g.arcTo(x,y+h,x,y,r);g.arcTo(x,y,x+w,y,r);g.closePath();}
  function makeLabel(name){const cv=document.createElement('canvas');cv.width=560;cv.height=150;const g=cv.getContext('2d');
    g.fillStyle='rgba(255,255,255,0.92)';rr(g,6,6,548,138,24);g.fill();
    g.strokeStyle='rgba(31,39,51,0.14)';g.lineWidth=3;rr(g,6,6,548,138,24);g.stroke();
    g.fillStyle='#1f2733';g.textAlign='center';g.font='bold 50px -apple-system,Segoe UI,Roboto,sans-serif';g.fillText(name,280,92,528);
    const tex=new THREE.CanvasTexture(cv);tex.anisotropy=8;
    const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:tex,depthTest:false,transparent:true}));sp.scale.set(8.4,2.25,1);return sp;}
  closed.forEach(r=>{if(!r.name)return;const sp=makeLabel(r.name);sp.position.set(r.x+r.w/2-CX,CEIL-1.2,CZ-(r.y+r.h/2));FG.add(sp);labelSprites.push(sp);});
}

// build every floor, each in its own group stacked CEIL feet above the one below.
function buildAll(L){
  const shared={plot:L.plot,walls:L.walls,wings:L.wings};
  const flrs=(Array.isArray(L.floors)&&L.floors.length)?L.floors:[L];
  const floorH=CEIL, n=flrs.length;
  const g0=new THREE.Group(); world.add(g0); floorGroups.push(g0);
  build(Object.assign({},shared,flrs[0]),{g:g0});
  const cx0=CX,cz0=CZ,r0=home.r;
  for(let i=1;i<n;i++){
    const gi=new THREE.Group(); gi.position.y=i*floorH; world.add(gi); floorGroups.push(gi);
    build(Object.assign({},shared,flrs[i]),{g:gi,cx:cx0,cz:cz0,suppressGrade:true,skipGround:true});
  }
  CX=cx0;CZ=cz0;
  home.r=r0+(n-1)*floorH*0.9;
  home.ty=(n-1)*floorH/2+3;
  target.set(0,home.ty,0);
}

/* ---------- orbit controls ---------- */
const target=new THREE.Vector3(0,3,0);
let R=home.r,TH=home.th,PH=home.ph;
function applyCam(){const sp=Math.sin(PH);camera.position.set(target.x+R*sp*Math.cos(TH),target.y+R*Math.cos(PH),target.z+R*sp*Math.sin(TH));camera.lookAt(target);}
let drag=null,lx=0,ly=0;const el=renderer.domElement;
el.addEventListener('pointerdown',e=>{drag=e.button===2?'pan':'orbit';lx=e.clientX;ly=e.clientY;el.setPointerCapture(e.pointerId);});
el.addEventListener('pointermove',e=>{if(!drag)return;const dx=e.clientX-lx,dy=e.clientY-ly;lx=e.clientX;ly=e.clientY;
  if(drag==='orbit'){TH-=dx*0.005;PH-=dy*0.005;PH=Math.max(0.16,Math.min(1.45,PH));}
  else{const f=R*0.0016;target.x-=Math.cos(TH)*dx*f;target.z-=Math.sin(TH)*dx*f;target.x+=Math.sin(TH)*dy*f;target.z-=Math.cos(TH)*dy*f;}
  applyCam();});
addEventListener('pointerup',()=>drag=null);
el.addEventListener('contextmenu',e=>e.preventDefault());
el.addEventListener('wheel',e=>{e.preventDefault();R*=(1+Math.sign(e.deltaY)*0.08);R=Math.max(12,Math.min(600,R));applyCam();},{passive:false});

let wallMode=1;const wallBtn=document.getElementById('wallsBtn');   // default: Low cutaway so the styled interior (oak, furniture) is visible
function applyWallMode(){wallBtn.querySelector('.val').textContent=['Solid','Low','Off'][wallMode];
  walls.forEach(({mesh})=>{if(wallMode===2){mesh.visible=false;return;}mesh.visible=true;
    if(wallMode===1){mesh.scale.y=0.34;mesh.position.y=CEIL*0.34/2;}   // dollhouse cut-down
    else{mesh.scale.y=1;mesh.position.y=CEIL/2;}});}
wallBtn.onclick=()=>{wallMode=(wallMode+1)%3;applyWallMode();};
let furnOn=true;const furnBtn=document.getElementById('furnBtn');
furnBtn.onclick=()=>{furnOn=!furnOn;furnBtn.querySelector('.val').textContent=furnOn?'On':'Off';furnGroups.forEach(g=>g.visible=furnOn);};
// Floors: hide the levels above a chosen floor so you can look down into it. Cycles All → top-1 → … → ground → All.
let topShown=Infinity;const floorsBtn=document.getElementById('floorsBtn');
function applyFloors(){const n=floorGroups.length,top=Math.min(topShown,n-1);
  floorGroups.forEach((g,i)=>{g.visible=i<=top;});
  floorsBtn.querySelector('.val').textContent=(top>=n-1)?'All':('Floor '+(top+1));}
floorsBtn.onclick=()=>{const n=floorGroups.length;let top=Math.min(topShown,n-1);top=(top<=0)?n-1:top-1;topShown=top;applyFloors();};
let labelsOn=false;const labelBtn=document.getElementById('labelBtn');  // default: Off
function applyLabels(){labelBtn.querySelector('.val').textContent=labelsOn?'On':'Off';labelSprites.forEach(s=>s.visible=labelsOn);}
labelBtn.onclick=()=>{labelsOn=!labelsOn;applyLabels();};
let spin=false;const spinBtn=document.getElementById('spinBtn');
spinBtn.onclick=()=>{spin=!spin;spinBtn.querySelector('.val').textContent=spin?'On':'Off';};
document.getElementById('resetBtn').onclick=()=>{R=home.r;TH=home.th;PH=home.ph;target.set(0,home.ty||3,0);applyCam();};
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});

const uiToggle=document.getElementById('uiToggle');
function setClean(on){document.body.classList.toggle('clean',on);uiToggle.textContent=on?'Show UI  ·  H':'Hide UI  ·  H';}
uiToggle.onclick=()=>setClean(!document.body.classList.contains('clean'));
addEventListener('keydown',e=>{if((e.key==='h'||e.key==='H')&&!e.metaKey&&!e.ctrlKey)setClean(!document.body.classList.contains('clean'));});

/* ---------- go ---------- */
(async function(){
  let L; try{L=await loadLayout();}catch(e){L={rooms:[]};}
  try{buildAll(L);}catch(err){console.error(err);document.getElementById('subtitle').textContent='Could not build the model from the layout.';}
  scene.traverse(o=>{if(!o.material)return;(Array.isArray(o.material)?o.material:[o.material]).forEach(m=>{   // dial back image-based lighting so plaster/oak keep their tone
    if('envMapIntensity' in m){m.envMapIntensity=0.4;m.needsUpdate=true;}});});
  applyWallMode();applyLabels();        // apply the Solid-walls / labels-off defaults now that geometry exists
  if(floorGroups.length>1){floorsBtn.style.display='';topShown=floorGroups.length-1;applyFloors();}   // multi-floor → offer the Floors control
  const flrs=(Array.isArray(L.floors)&&L.floors.length)?L.floors:[L];
  const nf=flrs.length,
    nr=flrs.reduce((s,f)=>s+(f.rooms||[]).filter(r=>!r.open).length,0),
    no=flrs.reduce((s,f)=>s+(f.openings||[]).length,0),
    nfu=flrs.reduce((s,f)=>s+(f.furniture||[]).length,0);
  document.getElementById('subtitle').textContent=`${nf} floor${nf>1?'s':''} · ${nr} rooms · ${no} openings · ${nfu} furniture — built from your 2D plan`;
  R=home.r;applyCam();
  document.getElementById('loading').style.display='none';
  (function loop(){requestAnimationFrame(loop);if(spin){TH+=0.0025;applyCam();}renderer.render(scene,camera);})();
})();
})();
</script>
</body>
